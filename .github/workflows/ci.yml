# Pipeline CI (requisito do edital): acionado a cada push na main,
# compila o .NET, roda os testes xUnit (bônus: testes NA esteira) e gera
# as imagens Docker publicadas no GitHub Container Registry (GHCR).
# Deploy automatizado no Kubernetes: opcional no edital e inviável aqui
# (o cluster é local, inalcançável pelo runner) — ver README.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    name: Build .NET + testes xUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ConexaoSolidaria.sln

      - name: Build (Release)
        run: dotnet build ConexaoSolidaria.sln -c Release --no-restore

      - name: Testes de unidade (xUnit)
        run: dotnet test ConexaoSolidaria.sln -c Release --no-build --logger "trx;LogFileName=resultados.trx"

      - name: Publicar resultados de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-testes
          path: "**/TestResults/*.trx"

  docker:
    name: Imagem Docker — ${{ matrix.service }}
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: campanhas-api
            dockerfile: src/Services/Campanhas/Campanhas.Api/Dockerfile
          - service: doacoes-api
            dockerfile: src/Services/Doacoes/Doacoes.Api/Dockerfile
          - service: doacoes-worker
            dockerfile: src/Services/Doacoes/Doacoes.Worker/Dockerfile
          - service: web
            dockerfile: src/Web/ConexaoSolidaria.Web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags e labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/conexao-solidaria/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build (e push na main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
