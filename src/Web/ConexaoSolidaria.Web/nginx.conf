# SPA Blazor WASM: qualquer rota desconhecida volta para o index.html
# (roteamento acontece no cliente).
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blazor publica .wasm/.dll — tipos MIME e compressão
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    gzip on;
    gzip_types text/css application/javascript application/wasm application/octet-stream application/json;
}
