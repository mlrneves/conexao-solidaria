# URLs das APIs para o browser: no cluster local, os NodePorts 30081/30082.
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-appsettings
  namespace: conexao-solidaria
data:
  appsettings.json: |
    {
      "Api": {
        "CampanhasBaseUrl": "http://localhost:30081",
        "DoacoesBaseUrl": "http://localhost:30082"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: conexao-solidaria
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: conexao-solidaria/web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: appsettings
              mountPath: /usr/share/nginx/html/appsettings.json
              subPath: appsettings.json
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: appsettings
          configMap:
            name: web-appsettings
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: conexao-solidaria
  labels:
    app: web
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080 # http://localhost:30080
