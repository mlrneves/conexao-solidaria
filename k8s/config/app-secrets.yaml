# ATENÇÃO (LGPD/segurança): valores de DESENVOLVIMENTO, versionados de
# propósito para facilitar a correção acadêmica. Em produção este arquivo
# jamais iria para o repositório — os Secrets viriam de um cofre
# (Azure Key Vault, Sealed Secrets, External Secrets Operator...).
apiVersion: v1
kind: Secret
metadata:
  name: infra-secrets
  namespace: conexao-solidaria
type: Opaque
stringData:
  POSTGRES_DB: "conexao_campanhas"
  POSTGRES_USER: "app"
  POSTGRES_PASSWORD: "app-dev-pass"
  MONGO_INITDB_ROOT_USERNAME: "app"
  MONGO_INITDB_ROOT_PASSWORD: "app-dev-pass"
  RABBITMQ_DEFAULT_USER: "conexao"
  RABBITMQ_DEFAULT_PASS: "conexao-dev"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: conexao-solidaria
type: Opaque
stringData:
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=conexao_campanhas;Username=app;Password=app-dev-pass"
  ConnectionStrings__Mongo: "mongodb://app:app-dev-pass@mongodb:27017/?authSource=admin"
  RabbitMq__User: "conexao"
  RabbitMq__Pass: "conexao-dev"
  Jwt__Key: "chave-de-desenvolvimento-conexao-solidaria-2026-nao-usar-em-producao!"
  Seed__GestorEmail: "gestor@conexaosolidaria.org"
  Seed__GestorPassword: "Gestor@123!"
