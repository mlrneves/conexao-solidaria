# Dashboard "Conexão Solidária" provisionado automaticamente: o sidecar do
# Grafana (kube-prometheus-stack) importa ConfigMaps com label grafana_dashboard=1.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-conexao
  namespace: conexao-solidaria
  labels:
    grafana_dashboard: "1"
data:
  conexao-solidaria.json: |
    {
      "uid": "conexao-solidaria",
      "title": "Conexão Solidária — Plataforma",
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU por pod (namespace conexao-solidaria)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "percentunit" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"conexao-solidaria\", container!=\"\"}[2m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memória (working set) por pod",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"conexao-solidaria\", container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Requisições HTTP/s por serviço",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{namespace=\"conexao-solidaria\"}[1m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Doações processadas pelo Worker (por resultado)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "none" }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "area", "textMode": "value_and_name" },
          "targets": [
            {
              "expr": "sum(conexao_doacoes_processadas_total) by (resultado)",
              "legendFormat": "{{resultado}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
