# Instruem o Prometheus Operator a raspar o /metrics dos 3 microsserviços.
#
# O label "release: kps" é obrigatório: o Prometheus instalado pelo chart
# kube-prometheus-stack só enxerga ServiceMonitors que carreguem o label do
# release Helm. Sem ele os targets NUNCA aparecem — e sem nenhum erro visível.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: campanhas-api
  namespace: conexao-solidaria
  labels:
    app: campanhas-api
    release: kps
spec:
  selector:
    matchLabels:
      app: campanhas-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: doacoes-api
  namespace: conexao-solidaria
  labels:
    app: doacoes-api
    release: kps
spec:
  selector:
    matchLabels:
      app: doacoes-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: doacoes-worker
  namespace: conexao-solidaria
  labels:
    app: doacoes-worker
    release: kps
spec:
  selector:
    matchLabels:
      app: doacoes-worker
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
